name: rag-eval

# Only runs on pushes to main — never blocks development PRs
on:
  push:
    branches:
      - main

jobs:
  rag-eval:
    name: RAG Evaluation Suite (V10+)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-eval-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-eval-

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install deepeval ragas datasets

      - name: Run RAG evaluation suite
        working-directory: backend
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HACKATHON_BEARER_TOKEN: ${{ secrets.HACKATHON_BEARER_TOKEN }}
        run: |
          pytest tests/rag_eval/ -v --tb=short
